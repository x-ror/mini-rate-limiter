stages:
  - build
  - test

# Build the production image to prove the Dockerfile is valid and the app
# (plus native gems) compiles.
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t mini-rate-limiter:$CI_COMMIT_SHORT_SHA .

# Run the RSpec suite against a real Redis service.
test:
  stage: test
  image: ruby:4.0-slim
  services:
    - name: redis:7-alpine
      alias: redis
  variables:
    REDIS_URL: "redis://redis:6379/15"
    BUNDLE_PATH: vendor/bundle
  cache:
    key:
      files:
        - Gemfile.lock
    paths:
      - vendor/bundle
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends build-essential > /dev/null
    - gem install bundler
    - bundle install --jobs 4
  script:
    - bundle exec rspec

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # The Ruby service. `app` resolves via Docker's internal DNS.
    upstream tracker {
        server app:4567;
    }

    server {
        listen 80;
        server_name _;

        # Edge marker so callers can confirm the request went through nginx.
        add_header X-Proxied-By "nginx-edge" always;

        location / {
            proxy_pass http://tracker;
            proxy_http_version 1.1;

            # Preserve the real client identity for the upstream service.
            # Without this the app would only ever see nginx's container IP.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }
}

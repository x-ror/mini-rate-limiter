services:
  redis:
    image: redis:7-alpine
    # Counters are ephemeral; skip persistence for a lighter, faster container.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    environment:
      REDIS_URL: "redis://redis:6379/0"
      RATE_LIMIT: "60"
      RATE_WINDOW_MS: "60000"
      # Keep pool size >= Puma max threads so threads never share a Redis socket.
      PUMA_MAX_THREADS: "5"
      REDIS_POOL_SIZE: "5"
      REDIS_POOL_TIMEOUT: "5"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
